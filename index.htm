<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Projects</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f7fb;
    color:#222;
}

header{
    background:#111827;
    color:#fff;
    text-align:center;
    padding:70px 20px;
}

header h1{
    font-size:42px;
    margin-bottom:10px;
}

header p{
    color:#cbd5e1;
    max-width:700px;
    margin:auto;
}

.container{
    width:90%;
    max-width:1300px;
    margin:60px auto;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
    gap:30px;
}

.card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:230px;
    object-fit:cover;
}

.content{
    padding:22px;
}

.content h2{
    margin-bottom:10px;
}

.content p{
    color:#666;
    line-height:1.6;
    margin-bottom:18px;
}

.tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:20px;
}

.tags span{
    background:#eef2ff;
    color:#4f46e5;
    padding:7px 12px;
    border-radius:50px;
    font-size:13px;
}

.buttons{
    display:flex;
    gap:12px;
}
